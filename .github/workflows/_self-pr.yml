name: PR

on:
  pull_request: {}

permissions:
  contents: read

jobs:
  required-meta:
    permissions:
      contents: read
      pull-requests: write
      checks: write
    uses: BlindfoldedSurgery/actions-meta/.github/workflows/required.yml@v2

  check:
    uses: BlindfoldedSurgery/actions-releases/.github/workflows/commitizen-check.yml@v5
    permissions:
      contents: read
      pull-requests: write
    with:
      build-tool: uv
      python-version: "3.14"

  build-buildah-minimal:
    uses: ./.github/workflows/build-image-buildah.yml
    with:
      enable-cache: false
      push-image: false

  build-buildah-all-options:
    strategy:
      fail-fast: false
      matrix:
        context: [ "test-build", "./test-build"]
    uses: ./.github/workflows/build-image-buildah.yml
    with:
      enable-cache: false
      push-image: false
      additional-build-args: |
        MY_BUILD_ARG_ONE=test
        MY_BUILD_ARG_TWO=test2
      image-name: my-cool-project
      version: "1.2.3"
      tag-suffix: "-all-options"
      context: "${{ matrix.context }}"
      target: real

  build-buildah-minimal-cached:
    uses: ./.github/workflows/build-image-buildah.yml
    permissions:
      contents: read
      packages: write
    with:
      enable-cache: true
      image-name: pull-request-${{ github.event.pull_request.number }}/buildah-cached
      push-image: true

  build-buildah-third-party-arm64:
    uses: ./.github/workflows/build-image-buildah.yml
    with:
      image-name: my-cool-project
      runner-name-build: ubuntu-24.04-arm
      push-image: false

  build-dual-buildah:
    uses: ./.github/workflows/build-dual-image-buildah.yml
    permissions:
      contents: read
      packages: write
    with:
      image-name: pull-request-${{ github.event.pull_request.number }}/dual-buildah
      push-image: true

  build-buildah-amd64:
    uses: ./.github/workflows/build-image-buildah.yml
    permissions:
      contents: read
      packages: write
    with:
      image-name: pull-request-${{ github.event.pull_request.number }}/merged
      enable-cache: false
      push-image: true
      runner-name-build: ubuntu-24.04

  build-buildah-arm64:
    uses: ./.github/workflows/build-image-buildah.yml
    permissions:
      contents: read
      packages: write
    with:
      image-name: pull-request-${{ github.event.pull_request.number }}/merged
      enable-cache: false
      push-image: true
      runner-name-build: ubuntu-24.04-arm

  merge-with-outputs:
    needs: [ build-buildah-amd64, build-buildah-arm64 ]
    uses: ./.github/workflows/merge-manifests.yml
    permissions:
      contents: read
      packages: write
    with:
      image-name: pull-request-${{ github.event.pull_request.number }}/merged
      tag: ${{ github.sha }}-merged-with-outputs
      variant-digests: |
        ${{ needs.build-buildah-amd64.outputs.digest }}
        ${{ needs.build-buildah-arm64.outputs.digest }}

  build-minimal-for-cleaning:
    uses: ./.github/workflows/build-image-buildah.yml
    permissions:
      contents: read
      packages: write
    with:
      enable-cache: false
      image-name: pull-request-${{ github.event.pull_request.number }}/for-cleaning
      push-image: true

  clean-package-versions:
    needs:
      - build-minimal-for-cleaning
    uses: ./.github/workflows/clean.yml
    permissions:
      contents: read
      packages: write
    with:
      image-name: pull-request-${{ github.event.pull_request.number }}/for-cleaning
      min-versions-to-keep: 1

  all-checks-passed:
    runs-on: ubuntu-slim
    needs:
      - merge-with-outputs
      - build-dual-buildah
      - build-buildah-minimal
      - build-buildah-minimal-cached
      - build-buildah-third-party-arm64
      - build-buildah-all-options
      - clean-package-versions
    steps:
      - run: echo "Done."

  clean:
    runs-on: ubuntu-slim
    # Cleanup workflow isn't triggered in this case
    if: github.head_ref == 'bump-version'
    permissions:
      contents: read
      packages: write
    needs:
      - all-checks-passed
    strategy:
      fail-fast: false
      matrix:
        variant:
          - buildah-cached
          - buildah-cached/layer-cache
          - dual-buildah/layer-cache
          - dual-buildah
          - for-cleaning
          - merged
    steps:
      - id: encode-name
        run: |
          PACKAGE_NAME="pull-request-${{ github.event.pull_request.number }}/${{ matrix.variant }}"
          # Poor man's urlencode
          ENCODED="${PACKAGE_NAME//\//%2F}"
          echo "package-name=${ENCODED}" >> "$GITHUB_OUTPUT"
      - run: >
          gh api
          --method DELETE 
          -H "Accept: application/vnd.github+json" 
          -H "X-GitHub-Api-Version: 2022-11-28" 
          /orgs/${{ github.repository_owner}}/packages/container/${{ steps.encode-name.outputs.package-name }}
        env:
          GH_TOKEN: ${{ secrets.GH_PACKAGE_CLEANUP_TOKEN }}
