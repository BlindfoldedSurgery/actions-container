on:
  workflow_call:
    inputs:
      continue-on-error:
        type: boolean
        required: false
        default: true
      image-name:
        type: string
        required: false
      min-versions-to-keep:
        type: number
        required: false
        default: 10

permissions:
  packages: write

jobs:
  clean:
    runs-on: ubuntu-24.04
    steps:
      - name: Inject slug/short variables
        uses: rlespinasse/github-slug-action@e6f261660910b273384c5c42b17a0217881b217a # v5.6.0
      - name: Clean up old app container images
        uses: actions/delete-package-versions@e5bc658cc4c965c472efe991f8beea3981499c55 # v5.0.0
        with:
          package-name: ${{ inputs.image-name || env.GITHUB_REPOSITORY_NAME_PART_SLUG }}
          package-type: container
          min-versions-to-keep: ${{ inputs.min-versions-to-keep }}
